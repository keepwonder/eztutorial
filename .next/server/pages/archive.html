pm run build\n\n# 推送到 GitHub 自动部署\ngit add .\ngit commit -m \"添加新文章\"\ngit push origin main\n```\n\n## Markdown 语法示例\n\n### 代码块\n\n```javascript\n// JavaScript 示例\nfunction hello() {\n  console.log('Hello, EzTutorial!')\n}\n```\n\n```python\n# Python 示例\ndef hello():\n    print(\"Hello, EzTutorial!\")\n```\n\n### 表格\n\n| 功能 | 状态 | 说明 |\n|------|------|------|\n| Markdown | ✅ | 完全支持 |\n| 代码高亮 | ✅ | 100+ 语言 |\n| 数学公式 | 🚧 | 开发中 |\n\n### 引用\n\n\u003e EzTutorial 让写作变得简单。\n\u003e \n\u003e —— 作者\n\n## 与 EzWrite 联动\n\n未来 EzWrite 将支持一键发布到 EzTutorial：\n\n1. 在 EzWrite 中写作\n2. 一键推送到 EzTutorial\n3. 自动分类和标签\n4. 版本历史管理\n\n## 结语\n\n开始你的写作之旅吧！\n","readingTime":2,"title":"欢迎使用 EzTutorial","date":"2026-03-06","category":"教程","tags":["eztutorial","markdown","开始"],"excerpt":"EzTutorial 是一个基于 Markdown 的个人博客系统，支持分类、标签、代码高亮等特性。本文介绍如何使用 EzTutorial 发布内容。"},{"id":"nextjs-best-practices","slug":"nextjs-best-practices","content":"\n# Next.js 开发最佳实践\n\nNext.js 14 带来了许多激动人心的特性。\n\n## App Router\n\nApp Router 是 Next.js 13+ 推荐的 routing 方案。\n\n### 核心概念\n\n```typescript\n// app/page.tsx\nexport default function Home() {\n  return \u003ch1\u003eHello Next.js!\u003c/h1\u003e\n}\n```\n\n## Server Components\n\n默认情况下，Next.js 的组件都是 Server Components。\n\n### 优势\n\n- 减少客户端 JavaScript\n- 直接访问后端资源\n- 更好的性能\n\n### 使用 Client Components\n\n当需要使用浏览器 API 或 React hooks 时：\n\n```typescript\n'use client'\n\nimport { useState } from 'react'\n\nexport default function Counter() {\n  const [count, setCount] = useState(0)\n  return \u003cbutton onClick={() =\u003e setCount(c + 1)}\u003e{count}\u003c/button\u003e\n}\n```\n\n## 数据获取\n\n### Server Components 中获取数据\n\n```typescript\nasync function getData() {\n  const res = await fetch('https://api.example.com/data')\n  return res.json()\n}\n\nexport default async function Page() {\n  const data = await getData()\n  return \u003cdiv\u003e{data.title}\u003c/div\u003e\n}\n```\n\n## 部署\n\n推荐使用 Vercel 进行部署：\n\n```bash\nvercel --prod\n```\n\n## 总结\n\nNext.js 14 是现代 React 应用的首选框架。\n","readingTime":1,"title":"Next.js 开发最佳实践","date":"2026-03-05","modified":"2026-03-06","category":"技术","tags":["nextjs","react","frontend"],"excerpt":"总结 Next.js 14 开发中的最佳实践，包括 App Router、Server Components、数据获取等核心概念。"}]},"__N_SSG":true},"page":"/archive","query":{},"buildId":"HeyJRd0p1IdXc1nA04_r6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
