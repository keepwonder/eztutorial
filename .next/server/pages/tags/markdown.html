v><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"tag":"markdown","posts":[{"id":"welcome","slug":"welcome","content":"\n# 欢迎使用 EzTutorial\n\nEzTutorial 是一个基于 **Markdown** 的个人技术博客平台。\n\n## 特性\n\n- 📝 **Markdown 原生支持** - 使用熟悉的 Markdown 语法写作\n- 🏷️ **分类与标签** - 多维度组织你的内容\n- 📊 **阅读统计** - 自动计算阅读时长\n- 🎨 **代码高亮** - 支持多种编程语言\n- 📱 **响应式设计** - 完美适配移动端\n\n## 快速开始\n\n### 1. 创建文章\n\n在 `posts/` 目录下创建 `.md` 文件：\n\n```markdown\n---\ntitle: '文章标题'\ndate: '2026-03-06'\ncategory: '技术'\ntags: ['react', 'nextjs']\nexcerpt: '文章摘要'\n---\n\n# 正文内容\n\n你的文章内容...\n```\n\n### 2. Frontmatter 说明\n\n| 字段 | 说明 | 必填 |\n|------|------|------|\n| `title` | 文章标题 | ✅ |\n| `date` | 发布日期 | ✅ |\n| `category` | 分类 | ✅ |\n| `tags` | 标签数组 | ✅ |\n| `excerpt` | 文章摘要 | ✅ |\n| `modified` | 修改日期 | ❌ |\n\n### 3. 发布\n\n```bash\n# 本地预览\nnpm run dev\n\n# 构建\nnpm run build\n\n# 推送到 GitHub 自动部署\ngit add .\ngit commit -m \"添加新文章\"\ngit push origin main\n```\n\n## Markdown 语法示例\n\n### 代码块\n\n```javascript\n// JavaScript 示例\nfunction hello() {\n  console.log('Hello, EzTutorial!')\n}\n```\n\n```python\n# Python 示例\ndef hello():\n    print(\"Hello, EzTutorial!\")\n```\n\n### 表格\n\n| 功能 | 状态 | 说明 |\n|------|------|------|\n| Markdown | ✅ | 完全支持 |\n| 代码高亮 | ✅ | 100+ 语言 |\n| 数学公式 | 🚧 | 开发中 |\n\n### 引用\n\n\u003e EzTutorial 让写作变得简单。\n\u003e \n\u003e —— 作者\n\n## 与 EzWrite 联动\n\n未来 EzWrite 将支持一键发布到 EzTutorial：\n\n1. 在 EzWrite 中写作\n2. 一键推送到 EzTutorial\n3. 自动分类和标签\n4. 版本历史管理\n\n## 结语\n\n开始你的写作之旅吧！\n","readingTime":2,"title":"欢迎使用 EzTutorial","date":"2026-03-06","category":"教程","tags":["eztutorial","markdown","开始"],"excerpt":"EzTutorial 是一个基于 Markdown 的个人博客系统，支持分类、标签、代码高亮等特性。本文介绍如何使用 EzTutorial 发布内容。"}],"tags":["eztutorial","frontend","markdown","nextjs","react","开始"]},"__N_SSG":true},"page":"/tags/[tag]","query":{"tag":"markdown"},"buildId":"HeyJRd0p1IdXc1nA04_r6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
