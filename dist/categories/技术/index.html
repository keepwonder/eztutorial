State } from 'react'\n\nexport default function Counter() {\n  const [count, setCount] = useState(0)\n  return \u003cbutton onClick={() =\u003e setCount(c + 1)}\u003e{count}\u003c/button\u003e\n}\n```\n\n## 数据获取\n\n### Server Components 中获取数据\n\n```typescript\nasync function getData() {\n  const res = await fetch('https://api.example.com/data')\n  return res.json()\n}\n\nexport default async function Page() {\n  const data = await getData()\n  return \u003cdiv\u003e{data.title}\u003c/div\u003e\n}\n```\n\n## 部署\n\n推荐使用 Vercel 进行部署：\n\n```bash\nvercel --prod\n```\n\n## 总结\n\nNext.js 14 是现代 React 应用的首选框架。\n","readingTime":1,"title":"Next.js 开发最佳实践","date":"2026-03-05","modified":"2026-03-06","category":"技术","tags":["nextjs","react","frontend"],"excerpt":"总结 Next.js 14 开发中的最佳实践，包括 App Router、Server Components、数据获取等核心概念。"}],"categories":["技术","教程"]},"__N_SSG":true},"page":"/categories/[category]","query":{"category":"技术"},"buildId":"HeyJRd0p1IdXc1nA04_r6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
